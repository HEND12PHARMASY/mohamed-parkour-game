<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Mohamed Parkour PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --c1:#00e5ff;--c2:#ff6b00;--c3:#ffd700;--c4:#ff2255;--c5:#22ff55;
  --c6:#aa00ff;--cE:#ff44ff;--cH:#00ff88;--bg:#020512;--bg2:#0a1225;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);overflow:hidden;font-family:'Cairo',sans-serif;color:#e0f0ff;touch-action:none;user-select:none;}
canvas#c{display:block;width:100vw;height:100vh;position:fixed;top:0;left:0;}

.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;background:rgba(2,5,18,0.93);backdrop-filter:blur(20px);transition:opacity 0.45s,transform 0.45s;}
.screen.hide{opacity:0;pointer-events:none;transform:scale(0.96);}
.logo{font-family:'Orbitron';font-size:clamp(2rem,8vw,3.2rem);font-weight:900;color:#fff;letter-spacing:2px;line-height:1;text-align:center;}
.logo-sub{font-family:'Orbitron';font-size:clamp(1rem,4.5vw,1.8rem);font-weight:900;color:var(--c1);text-shadow:0 0 20px var(--c1);letter-spacing:4px;text-align:center;}
.logo-line{width:260px;height:2px;background:linear-gradient(90deg,transparent,var(--c1),transparent);margin:8px auto 16px;}
.btn{font-family:'Orbitron';font-size:.82rem;font-weight:700;padding:12px 32px;border:2px solid currentColor;background:transparent;cursor:pointer;margin:5px;min-width:210px;color:var(--c1);transition:all 0.3s;border-radius:3px;text-transform:uppercase;letter-spacing:1px;position:relative;overflow:hidden;}
.btn::before{content:'';position:absolute;inset:0;background:currentColor;transform:scaleX(0);transform-origin:left;transition:transform 0.3s;z-index:-1;}
.btn:hover::before{transform:scaleX(1);}
.btn:hover{color:#000;box-shadow:0 0 30px currentColor;}
.btn-gold{color:var(--c3);}.btn-red{color:var(--c4);}.btn-purple{color:var(--c6);}

/* HUD */
#hud{position:fixed;top:0;left:0;right:0;padding:10px 14px;display:none;flex-direction:column;gap:7px;z-index:10;pointer-events:none;}
.hud-row{display:flex;justify-content:space-between;width:100%;align-items:center;gap:6px;}
.hb{background:rgba(0,0,0,0.72);padding:5px 12px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;gap:7px;backdrop-filter:blur(10px);}
.hv{font-size:1rem;font-weight:900;font-family:'Orbitron';}
.bar-shell{width:110px;height:9px;background:#0d1f0d;border-radius:5px;overflow:hidden;border:1px solid rgba(0,255,136,0.3);}
#health-bar{height:100%;background:linear-gradient(90deg,var(--cH),#00ffaa);transition:width 0.3s,background 0.5s;border-radius:5px;}
.bar-shell.e-shell{background:#1a0d1a;border-color:rgba(255,68,255,0.3);}
#energy-bar{height:100%;background:linear-gradient(90deg,var(--cE),#ff88ff);transition:width 0.2s;border-radius:5px;}
.stage-badge{font-family:'Orbitron';font-size:.8rem;font-weight:900;color:var(--c2);padding:3px 10px;border:1px solid var(--c2);border-radius:4px;text-shadow:0 0 10px var(--c2);letter-spacing:2px;white-space:nowrap;}

/* STAGE PROGRESS */
#stageBar{position:fixed;bottom:0;left:0;right:0;height:5px;background:rgba(255,255,255,0.07);z-index:10;pointer-events:none;display:none;}
#stageBarFill{height:100%;transition:width 0.5s,background 1s;width:0%;}

/* POWER ROW */
#powerRow{display:flex;gap:5px;align-items:center;}
.pu-icon{width:30px;height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.9rem;border:1px solid rgba(255,255,255,0.2);background:rgba(0,0,0,0.5);position:relative;overflow:hidden;}
.pu-timer{position:absolute;bottom:0;left:0;height:3px;transition:width 0.1s linear;}

/* STAGE FLASH */
#stageFlash{position:fixed;inset:0;z-index:30;pointer-events:none;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;transition:opacity 0.15s;}
#stageFlash.show{opacity:1;}
.stage-text{font-family:'Orbitron';font-size:clamp(2rem,10vw,4.5rem);font-weight:900;color:#fff;text-shadow:0 0 30px var(--c3),0 0 70px var(--c3);animation:sPop 0.5s ease;text-align:center;}
.stage-sub{font-family:'Orbitron';font-size:clamp(.8rem,3vw,1.2rem);color:var(--c3);text-align:center;margin-top:6px;opacity:.85;animation:sPop 0.5s 0.1s ease both;}
@keyframes sPop{0%{transform:scale(0.2);opacity:0;}60%{transform:scale(1.15);}100%{transform:scale(1);opacity:1;}}
#levelBg{position:fixed;inset:0;z-index:25;pointer-events:none;opacity:0;transition:opacity 0.5s;}
#levelBg.show{opacity:1;}

/* CONTROLS */
#controls{
  position:fixed;bottom:0;left:0;right:0;height:140px;
  display:none;pointer-events:none;z-index:15;
}
/* Joystick — bottom left */
.joy-wrap{
  position:absolute;bottom:20px;left:20px;
  width:120px;height:120px;pointer-events:auto;
}
.joy-base{
  position:absolute;inset:0;border-radius:50%;
  background:rgba(0,0,0,0.45);
  border:2px solid rgba(0,229,255,0.3);
  box-shadow:0 0 18px rgba(0,229,255,0.12),inset 0 0 16px rgba(0,0,0,0.5);
  backdrop-filter:blur(8px);
}
.joy-knob{
  position:absolute;top:50%;left:50%;
  width:48px;height:48px;border-radius:50%;
  transform:translate(-50%,-50%);
  background:radial-gradient(circle at 35% 35%,rgba(0,229,255,0.95),rgba(0,80,160,0.8));
  border:2px solid rgba(0,229,255,0.9);
  box-shadow:0 0 16px rgba(0,229,255,0.6);
  pointer-events:none;transition:box-shadow .1s;
}
.joy-knob.active{box-shadow:0 0 28px rgba(0,229,255,1);}
/* Jump button — bottom right */
.jump-btn{
  position:absolute;bottom:28px;right:22px;
  width:80px;height:80px;border-radius:50%;
  background:rgba(0,0,0,0.5);
  border:2px solid rgba(0,255,136,0.5);
  box-shadow:0 0 20px rgba(0,255,136,0.2),inset 0 0 12px rgba(0,0,0,0.4);
  display:flex;align-items:center;justify-content:center;
  font-size:2rem;color:var(--cH);
  pointer-events:auto;backdrop-filter:blur(8px);
  transition:all .12s;user-select:none;
}
.jump-btn:active{background:rgba(0,255,136,0.25);transform:scale(0.9);box-shadow:0 0 35px rgba(0,255,136,0.7);}

#pCanvas{position:fixed;inset:0;pointer-events:none;z-index:11;}
@keyframes popUp{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-70px) scale(0.5);}}
.popup{position:fixed;pointer-events:none;font-family:'Orbitron';font-size:1.1rem;font-weight:900;animation:popUp 0.9s forwards;z-index:50;text-shadow:0 0 10px currentColor;}
@keyframes ovAnim{0%,100%{opacity:0;}40%{opacity:1;}}
#hitOverlay{position:fixed;inset:0;pointer-events:none;z-index:22;background:radial-gradient(ellipse at center,rgba(255,34,85,0.35),transparent 70%);display:none;}
#hitOverlay.show{display:block;animation:ovAnim 0.35s ease;}
#healOverlay{position:fixed;inset:0;pointer-events:none;z-index:22;background:radial-gradient(ellipse at center,rgba(0,255,136,0.22),transparent 70%);display:none;}
#healOverlay.show{display:block;animation:ovAnim 0.5s ease;}
#energyOverlay{position:fixed;inset:0;pointer-events:none;z-index:22;background:radial-gradient(ellipse at center,rgba(255,68,255,0.22),transparent 70%);display:none;}
#energyOverlay.show{display:block;animation:ovAnim 0.5s ease;}

/* SHOP */
.shop-wrap{width:92%;max-width:560px;}
.shop-title{font-family:'Orbitron';font-size:1.4rem;color:var(--c1);text-shadow:0 0 20px var(--c1);margin-bottom:12px;text-align:center;}
.balance-display{text-align:center;font-family:'Orbitron';font-size:1.2rem;color:var(--c3);margin-bottom:12px;text-shadow:0 0 20px var(--c3);}
.skinGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;max-height:48vh;overflow-y:auto;padding:4px;}
.skinCard{background:var(--bg2);border:2px solid #1a2a44;padding:10px 7px;border-radius:10px;text-align:center;transition:all 0.3s;position:relative;overflow:hidden;}
.skinCard.active{border-color:var(--c1);box-shadow:0 0 18px rgba(0,229,255,0.28);}
.skinCard:hover{border-color:rgba(0,229,255,0.4);transform:translateY(-2px);}
.skin-preview{width:46px;height:46px;margin:0 auto 7px;border-radius:50%;border:2px solid rgba(255,255,255,0.25);display:flex;align-items:center;justify-content:center;font-size:1.4rem;}
.skin-name{font-size:9px;font-weight:bold;margin-bottom:5px;color:#bbb;}
.skin-btn{font-family:'Orbitron';font-size:8px;padding:4px 5px;border:1px solid currentColor;background:transparent;cursor:pointer;color:var(--c1);border-radius:3px;width:100%;transition:all 0.2s;}
.skin-btn:hover{background:var(--c1);color:#000;}
.skin-btn.owned{color:var(--c5);border-color:var(--c5);}
.skin-btn.equipped{background:rgba(0,229,255,0.18);color:var(--c1);cursor:default;}
.skin-lock{position:absolute;top:4px;right:4px;font-size:.65rem;color:#444;}
.skinGrid::-webkit-scrollbar{width:3px;}
.skinGrid::-webkit-scrollbar-thumb{background:rgba(0,229,255,0.25);border-radius:2px;}

/* STAGES SCREEN */
.stage-info-wrap{width:92%;max-width:520px;max-height:58vh;overflow-y:auto;}
.stage-card{background:var(--bg2);border:2px solid #1a2a44;border-radius:12px;padding:12px 16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;transition:all 0.25s;}
.stage-card.unlocked{border-color:rgba(0,229,255,0.25);}
.stage-card.unlocked:hover{border-color:var(--c1);background:rgba(0,229,255,0.05);}
.stage-card.locked{opacity:0.4;}
.stage-num{font-family:'Orbitron';font-size:1.6rem;font-weight:900;min-width:44px;text-align:center;}
.stage-info{flex:1;}
.stage-label{font-family:'Orbitron';font-size:.75rem;font-weight:700;letter-spacing:1px;margin-bottom:3px;}
.stage-desc{font-size:11px;color:#99aabb;line-height:1.5;}
.stage-speed{font-family:'Orbitron';font-size:.62rem;color:var(--c2);margin-top:3px;}
.pu-legend{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:8px 0 12px;}
.pu-leg-item{display:flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;border:1px solid rgba(255,255,255,0.15);background:rgba(0,0,0,0.3);font-size:.75rem;}

/* GAME OVER */
.go-title{font-family:'Orbitron';font-size:clamp(2rem,9vw,3rem);font-weight:900;color:var(--c4);text-shadow:0 0 30px var(--c4);margin-bottom:18px;}
.go-stats{margin:8px 0 22px;font-size:1rem;text-align:center;}
.go-stat{display:flex;justify-content:space-between;gap:28px;padding:5px 18px;border-bottom:1px solid rgba(255,255,255,0.07);}

/* SCANLINES */
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.025) 2px,rgba(0,0,0,0.025) 4px);pointer-events:none;z-index:100;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<canvas id="pCanvas"></canvas>

<div id="stageFlash"><div class="stage-text" id="stageText"></div><div class="stage-sub" id="stageSub"></div></div>
<div id="levelBg"></div>
<div id="hitOverlay"></div>
<div id="healOverlay"></div>
<div id="energyOverlay"></div>
<div id="stageBar"><div id="stageBarFill"></div></div>

<!-- HUD -->
<div id="hud">
  <div class="hud-row">
    <div class="hb"><span style="color:var(--cH)">❤</span><div class="bar-shell"><div id="health-bar"></div></div><span class="hv" style="color:var(--cH);font-size:.8rem" id="hHP">100</span></div>
    <div class="hb"><div class="stage-badge" id="hLevel">S-1</div></div>
  </div>
  <div class="hud-row">
    <div class="hb"><span style="color:var(--cE)">⚡</span><div class="bar-shell e-shell"><div id="energy-bar"></div></div><span class="hv" style="color:var(--cE);font-size:.8rem" id="hEN">0</span></div>
    <div class="hb"><span style="color:var(--c3)">🪙</span><div class="hv" style="color:var(--c3)" id="hCoins">0</div></div>
    <div class="hb"><span style="color:var(--c1);font-size:.65rem;font-family:Orbitron">PTS</span><div class="hv" id="hScore">0</div></div>
  </div>
  <div class="hud-row" id="powerRow" style="justify-content:flex-end;min-height:34px;"></div>
</div>

<!-- Controls: Joystick left + Jump right -->
<div id="controls">
  <div class="joy-wrap" id="joyWrap">
    <div class="joy-base"></div>
    <div class="joy-knob" id="joyKnob"></div>
  </div>
  <div class="jump-btn" id="btnJump">⬆</div>
</div>

<!-- TITLE -->
<div id="titleSc" class="screen">
  <div class="logo">MOHAMED</div>
  <div class="logo-sub">PARKOUR PRO</div>
  <div class="logo-line"></div>
  <div class="balance-display" id="mainBalance">🪙 0</div>
  <button class="btn" onclick="startGame()">▶ ابدأ المغامرة</button>
  <button class="btn btn-gold" onclick="showScreen('shopSc')">🛒 الجراج</button>
  <button class="btn btn-purple" onclick="showScreen('stagesSc')">🗺 المراحل</button>
</div>

<!-- STAGES -->
<div id="stagesSc" class="screen hide">
  <h1 style="font-family:Orbitron;color:var(--c6);text-shadow:0 0 20px var(--c6);margin-bottom:6px;font-size:1.3rem;">🗺 خريطة المراحل</h1>
  <div class="pu-legend">
    <div class="pu-leg-item" style="color:var(--cH)">❤ صحة +35</div>
    <div class="pu-leg-item" style="color:var(--cE)">⚡ طاقة +40</div>
    <div class="pu-leg-item" style="color:var(--c1)">🛡 درع</div>
    <div class="pu-leg-item" style="color:var(--c3)">🧲 مغناطيس</div>
  </div>
  <div class="stage-info-wrap" id="stagesWrap"></div>
  <button class="btn btn-red" style="margin-top:10px;" onclick="showScreen('titleSc')">↩ عودة</button>
</div>

<!-- SHOP -->
<div id="shopSc" class="screen hide">
  <div class="shop-wrap">
    <div class="shop-title">⚡ GARAGE</div>
    <div class="balance-display" id="shopBalance">🪙 0</div>
    <div class="skinGrid" id="skinGrid"></div>
  </div>
  <button class="btn btn-red" style="margin-top:12px;" onclick="showScreen('titleSc')">↩ عودة</button>
</div>

<!-- GAME OVER -->
<div id="gameOverSc" class="screen hide">
  <div class="go-title">GAME OVER</div>
  <div class="go-stats" id="finalStats"></div>
  <button class="btn" onclick="startGame()">↺ مرة أخرى</button>
  <button class="btn btn-gold" onclick="showScreen('titleSc')">⌂ الرئيسية</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>


/* ===================== GAME DATA ===================== */
/* ── Minecraft-style skin palette ──
   skin: body hex color
   head: head hex (slightly different)
   arms/legs use darker shade auto */
const SKINS=[
  {id:'steve',   name:'Steve',         price:0,    body:0x7B6E5A, head:0xC8A882, hair:0x5C3D1E, eye:0x3A2A1A, shirt:0x4A6FA5, pants:0x2E5090, icon:'🧱', glow:0x7B6E5A},
  {id:'alex',    name:'Alex',          price:100,  body:0x7B6E5A, head:0xC8A882, hair:0xC87941, eye:0x3A2A1A, shirt:0x44AA55, pants:0x336644, icon:'🌿', glow:0x44AA55},
  {id:'creeper', name:'Creeper',       price:250,  body:0x44AA44, head:0x44AA44, hair:0x227722, eye:0x000000, shirt:0x44AA44, pants:0x336633, icon:'💚', glow:0x44ff44},
  {id:'zombie',  name:'Zombie',        price:500,  body:0x446644, head:0x557755, hair:0x223322, eye:0xff2222, shirt:0x3355AA, pants:0x334488, icon:'🧟', glow:0xff2222},
  {id:'skeleton',name:'Skeleton',      price:800,  body:0xDDDDDD, head:0xEEEEEE, hair:0xCCCCCC, eye:0x222222, shirt:0xCCCCCC, pants:0xBBBBBB, icon:'💀', glow:0xffffff},
  {id:'enderman',name:'Enderman',      price:1500, body:0x111111, head:0x111111, hair:0x000000, eye:0xDD00FF, shirt:0x111111, pants:0x0A0A0A, icon:'👾', glow:0xcc00ff},
];
const STAGES=[
  {num:1,name:'المدينة الرقمية',desc:'بداية الرحلة — عقبات بطيئة وعملات كثيرة. الحبات متاحة!',color:0x00e5ff,fogColor:0x020512,speedMult:1.00,icon:'🏙️'},
  {num:2,name:'الصحراء المحترقة',desc:'الحرارة ترتفع والعقبات تتضاعف. ابحث عن حبات الطاقة!',color:0xff6b00,fogColor:0x120800,speedMult:1.18,icon:'🔥'},
  {num:3,name:'قلب العاصفة',desc:'برق ورعد من كل اتجاه. حبات الصحة ستنقذك!',color:0xff2255,fogColor:0x150008,speedMult:1.38,icon:'⚡'},
  {num:4,name:'الفضاء الأرجواني',desc:'الجاذبية تضعف والعقبات تطير. الدرع ضروري!',color:0xaa00ff,fogColor:0x080015,speedMult:1.60,icon:'🌌'},
  {num:5,name:'غابة النيون',desc:'أشجار من الضوء ومخاطر من كل مكان. استخدم المغناطيس!',color:0x22ff55,fogColor:0x001508,speedMult:1.85,icon:'🌿'},
  {num:6,name:'ذروة الذهب',desc:'المرحلة النهائية — كل مهاراتك ستُحتاج الآن!',color:0xffd700,fogColor:0x181000,speedMult:2.15,icon:'👑'},
];
const PU={
  health:{id:'health',label:'❤',color:'#00ff88',colorHex:0x00ff88,desc:'+صحة'},
  energy:{id:'energy',label:'⚡',color:'#ff44ff',colorHex:0xff44ff,desc:'+طاقة'},
  shield:{id:'shield',label:'🛡',color:'#00e5ff',colorHex:0x00e5ff,desc:'درع'},
  magnet:{id:'magnet',label:'🧲',color:'#ffd700',colorHex:0xffd700,desc:'مغناطيس'},
};
let userData={
  coins:parseInt(localStorage.getItem('mp_coins'))||0,
  owned:JSON.parse(localStorage.getItem('mp_owned'))||['steve'],
  active:localStorage.getItem('mp_active')||'steve',
  bestScore:parseInt(localStorage.getItem('mp_best'))||0,
  bestStage:parseInt(localStorage.getItem('mp_bstage'))||1,
};

/* ===================== THREE.JS ===================== */
let scene,camera,renderer,clock;
let player,playerBody,playerEye,playerGlow;
let floorMesh,gridMesh;
let obstacles=[],coinMeshes=[],powerUps=[];
let gameActive=false,score=0,sessionCoins=0,speed=0,baseSpeed=0.55;
let lane=0,targetLane=0,laneSmooth=0;
let health=100,maxHealth=100,energy=0,maxEnergy=100;
let currentStageIdx=0,viewMode=0;
let invincible=false,invincibleTimer=0;
let totalDist=0,spawnTimer=0,spawnInterval=18;
let shieldActive=false,shieldTimer=0,magnetActive=false,magnetTimer=0;
let isJumping=false,jumpVY=0,playerY=0;
const GRAVITY=0.018, JUMP_FORCE=0.32, GROUND_Y=0;

const pCv=document.getElementById('pCanvas');
const pCtx=pCv.getContext('2d');
let p2d=[];
function resizeP(){pCv.width=innerWidth;pCv.height=innerHeight;}
resizeP();

function initThree(){
  scene=new THREE.Scene();
  scene.fog=new THREE.FogExp2(0x020512,0.034);
  camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.1,500);
  camera.position.set(0,5,12);
  renderer=new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true,alpha:true});
  renderer.setSize(innerWidth,innerHeight);
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=1.1;
  scene.add(new THREE.AmbientLight(0x334466,0.9));
  const sun=new THREE.DirectionalLight(0xffffff,0.5);sun.position.set(0,20,10);scene.add(sun);
  const neon=new THREE.PointLight(0x00e5ff,2,28);neon.position.set(0,3,0);scene.add(neon);
  // Floor — semi-transparent so bg bleeds through
  floorMesh=new THREE.Mesh(
    new THREE.PlaneGeometry(40,3000),
    new THREE.MeshPhongMaterial({color:0x04081f,emissive:0x010510,shininess:180,specular:0x00e5ff,transparent:false})
  );
  floorMesh.rotation.x=-Math.PI/2;floorMesh.position.z=-1000;scene.add(floorMesh);
  gridMesh=new THREE.GridHelper(3000,150,0x00e5ff,0x051838);
  gridMesh.position.y=0.02;gridMesh.position.z=-1000;scene.add(gridMesh);
  [-3.5,3.5].forEach(x=>{
    const lm=new THREE.Mesh(new THREE.PlaneGeometry(0.04,3000),new THREE.MeshBasicMaterial({color:0x0d2244,transparent:true,opacity:0.4}));
    lm.rotation.x=-Math.PI/2;lm.position.set(x,0.03,-1000);scene.add(lm);
  });
  clock=new THREE.Clock();
}

/* Build a blocky Minecraft-style character */
function mcMat(hex,emissive,ei){
  return new THREE.MeshLambertMaterial({color:hex,emissive:emissive||0x000000,emissiveIntensity:ei||0});
}
function mcBox(w,h,d,mat){return new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);}

function createPlayer(){
  if(player)scene.remove(player);
  const sk=SKINS.find(s=>s.id===userData.active)||SKINS[0];

  player=new THREE.Group();

  // ── HEAD ──
  const head=new THREE.Group();
  const headCube=mcBox(0.8,0.8,0.8,mcMat(sk.head));
  headCube.position.y=0;
  head.add(headCube);
  // hair/helmet layer (slightly bigger, same style)
  const hairCube=mcBox(0.86,0.3,0.86,mcMat(sk.hair));
  hairCube.position.y=0.25;
  head.add(hairCube);
  // eyes (two small black boxes)
  const eyeMat=mcMat(sk.eye);
  const eyeL=mcBox(0.18,0.14,0.05,eyeMat);eyeL.position.set(-0.18,0.06,0.41);head.add(eyeL);
  const eyeR=mcBox(0.18,0.14,0.05,eyeMat);eyeR.position.set( 0.18,0.06,0.41);head.add(eyeR);
  // mouth
  const mouth=mcBox(0.24,0.07,0.05,mcMat(0x220000));
  mouth.position.set(0,-0.14,0.41);head.add(mouth);
  head.position.y=1.85;
  player.add(head);
  playerEye=head; // track for invincibility flicker

  // ── BODY ──
  playerBody=mcBox(0.72,0.88,0.44,mcMat(sk.shirt));
  playerBody.position.y=1.12;
  player.add(playerBody);

  // ── LEGS ──
  const legMat=mcMat(sk.pants);
  const legL=mcBox(0.32,0.76,0.38,legMat);legL.position.set(-0.19,0.38,0);player.add(legL);
  const legR=mcBox(0.32,0.76,0.38,legMat);legR.position.set( 0.19,0.38,0);player.add(legR);

  // ── ARMS ──
  const armMat=mcMat(sk.head); // skin color
  const armL=mcBox(0.26,0.76,0.34,armMat);armL.position.set(-0.52,1.12,0);player.add(armL);
  const armR=mcBox(0.26,0.76,0.34,armMat);armR.position.set( 0.52,1.12,0);player.add(armR);

  // ── GLOW LIGHT ──
  playerGlow=new THREE.PointLight(sk.glow,1.2,5);
  playerGlow.position.y=1.2;player.add(playerGlow);

  player.position.set(0,0,0);
  scene.add(player);
}

const LANE_X=[-3.5,0,3.5];
function spawnObject(){
  const l=LANE_X[Math.floor(Math.random()*3)];
  const roll=Math.random();
  // Power-ups available from stage 1! chance increases with stage
  const puChance=0.12+currentStageIdx*0.02;
  if(roll<puChance){
    const keys=Object.keys(PU);
    // weight health/energy more heavily
    const weighted=['health','health','energy','energy','shield','magnet'];
    const pt=PU[weighted[Math.floor(Math.random()*weighted.length)]];
    const m=new THREE.Mesh(
      new THREE.OctahedronGeometry(0.55,0),
      new THREE.MeshPhongMaterial({color:pt.colorHex,emissive:pt.colorHex,emissiveIntensity:1.0,transparent:true,opacity:0.95,shininess:200})
    );
    m.position.set(l,1.3,-135);m.userData={type:'powerup',puType:pt.id};
    // add inner glow sphere
    const inner=new THREE.Mesh(new THREE.SphereGeometry(0.3,8,8),new THREE.MeshBasicMaterial({color:pt.colorHex,transparent:true,opacity:0.5}));
    m.add(inner);
    // point light on power-up
    const pl=new THREE.PointLight(pt.colorHex,2,5);m.add(pl);
    scene.add(m);powerUps.push(m);
  } else if(roll<puChance+0.33){
    const c=new THREE.Mesh(
      new THREE.CylinderGeometry(0.36,0.36,0.09,20),
      new THREE.MeshPhongMaterial({color:0xffd700,emissive:0xffaa00,emissiveIntensity:0.9,shininess:200})
    );
    c.rotation.x=Math.PI/2;c.position.set(l,1,-135);c.userData={type:'coin'};
    const cl=new THREE.PointLight(0xffd700,1.5,4);c.add(cl);
    scene.add(c);coinMeshes.push(c);
  } else {
    const h2=0.9+Math.random()*1.5+currentStageIdx*0.2;
    const shapes=[new THREE.BoxGeometry(1.8+Math.random(),h2,1.2),new THREE.CylinderGeometry(0.7,0.7,h2,8)];
    const o=new THREE.Mesh(shapes[Math.floor(Math.random()*shapes.length)],
      new THREE.MeshPhongMaterial({color:0xff2255,emissive:0xaa0022,emissiveIntensity:0.6}));
    o.position.set(l,h2/2,-135);o.userData={type:'obstacle'};scene.add(o);obstacles.push(o);
  }
}

function startGame(){
  cancelAnimationFrame(window._animId);
  // reset all state
  health=maxHealth;energy=0;currentStageIdx=0;score=0;sessionCoins=0;
  speed=baseSpeed;targetLane=0;lane=0;laneSmooth=0;
  invincible=false;totalDist=0;spawnTimer=0;spawnInterval=18;
  isJumping=false;jumpVY=0;playerY=0;
  shieldActive=false;magnetActive=false;p2d=[];
  // clear objects
  obstacles.forEach(o=>scene.remove(o));obstacles=[];
  coinMeshes.forEach(c=>scene.remove(c));coinMeshes=[];
  powerUps.forEach(p=>scene.remove(p));powerUps=[];
  // reset UI
  updateBars();
  document.getElementById('hLevel').innerText='S-1';
  document.getElementById('powerRow').innerHTML='';
  document.getElementById('stageBarFill').style.width='0%';
  // create player & env
  createPlayer();
  applyStageEnv(0);
  // show game screen
  showScreen('hud');
  gameActive=true;
  clock=new THREE.Clock();
  clock.start();
  loop();
}

function applyStageEnv(idx){
  const st=STAGES[idx];
  if(gridMesh)gridMesh.material.color.setHex(st.color);
  scene.fog.color.setHex(st.fogColor);
  scene.fog.density=0.025+idx*0.004;
  document.getElementById('hLevel').innerText='S-'+st.num;
  const r=(st.color>>16)&255,g=(st.color>>8)&255,b=st.color&255;
  document.getElementById('stageBarFill').style.background='linear-gradient(90deg,rgb('+r+','+g+','+b+'),rgb('+Math.floor(r*0.5)+','+Math.floor(g*0.5)+','+Math.floor(b*0.5)+'))';
  document.getElementById('levelBg').style.background='radial-gradient(ellipse at center,rgba('+r+','+g+','+b+',0.14) 0%,transparent 70%)';
}

let _cx=0,_cy=5,_cz=12;
function loop(){
  window._animId=requestAnimationFrame(loop);
  if(!gameActive)return;
  const dt=Math.min(clock.getDelta(),0.05);
  const t=clock.getElapsedTime();
  const stage=STAGES[currentStageIdx];
  speed=baseSpeed*stage.speedMult+(totalDist*0.000035);
  totalDist+=speed*dt*60;
  score+=dt*10*(1+currentStageIdx*0.15);
  document.getElementById('stageBarFill').style.width=(Math.min((totalDist-currentStageIdx*1500)/1500,1)*100)+'%';
  const newIdx=Math.min(Math.floor(totalDist/1500),STAGES.length-1);
  if(newIdx!==currentStageIdx){currentStageIdx=newIdx;triggerStageUp();}
  spawnTimer++;
  if(spawnTimer>=spawnInterval){spawnObject();spawnTimer=0;spawnInterval=Math.max(6,18-currentStageIdx*2+Math.random()*4);}
  if(invincible){invincibleTimer-=dt;const vis=Math.sin(t*28)>0;player.traverse(m=>{if(m.isMesh)m.visible=vis;});if(invincibleTimer<=0){invincible=false;player.traverse(m=>{if(m.isMesh)m.visible=true;})}}
  if(shieldActive){shieldTimer-=dt;if(shieldTimer<=0)deactivateShield();updatePowerRow();}
  if(magnetActive){magnetTimer-=dt;if(magnetTimer<=0){magnetActive=false;updatePowerRow();}}
  if(energy>0)energy=Math.max(0,energy-dt*2);
  laneSmooth+=(targetLane*3.5-laneSmooth)*0.17;
  player.position.x=laneSmooth;
  // Jump physics
  if(isJumping){
    playerY+=jumpVY;
    jumpVY-=GRAVITY;
    if(playerY<=GROUND_Y){playerY=GROUND_Y;isJumping=false;jumpVY=0;}
  }
  player.position.y=playerY+Math.sin(t*8)*0.03;
  playerBody.rotation.z=(targetLane*3.5-laneSmooth)*-0.13;
  // Minecraft walk animation — swing arms & legs
  const walkSwing=Math.sin(t*12)*0.35;
  if(player.children.length>4){
    player.children[3].rotation.x= walkSwing;  // legL
    player.children[4].rotation.x=-walkSwing;  // legR
    player.children[5].rotation.x=-walkSwing;  // armL
    player.children[6].rotation.x= walkSwing;  // armR
  }
  // Spin power-ups beautifully
  powerUps.forEach(pu=>{pu.rotation.x+=0.04;pu.rotation.y+=0.06;pu.position.y=1.3+Math.sin(t*3+pu.position.x)*0.15;});
  coinMeshes.forEach(c=>{c.rotation.z+=0.06;c.position.y=1+Math.sin(t*4+c.position.x)*0.1;});
  if(magnetActive){
    coinMeshes.forEach(c=>{const dx=player.position.x-c.position.x,dz=player.position.z-c.position.z,d=Math.sqrt(dx*dx+dz*dz);if(d<9){c.position.x+=dx*0.08;c.position.z+=dz*0.08;}});
  }
  if(viewMode===0){_cx=player.position.x*0.28;_cy=5;_cz=12;}
  else{_cx=player.position.x*0.75;_cy=2.3;_cz=3;}
  camera.position.x+=(_cx-camera.position.x)*0.1;
  camera.position.y+=(_cy-camera.position.y)*0.1;
  camera.position.z+=(_cz-camera.position.z)*0.1;
  camera.lookAt(player.position.x*0.4,1,-8);
  // obstacles
  for(let i=obstacles.length-1;i>=0;i--){
    const o=obstacles[i];o.position.z+=speed;o.rotation.y+=0.018;
    if(o.position.z>18){scene.remove(o);obstacles.splice(i,1);continue;}
    if(Math.abs(o.position.x-player.position.x)<1.25&&Math.abs(o.position.z-player.position.z)<1.25&&playerY<1.0&&!invincible){
      if(shieldActive){deactivateShield();scene.remove(o);obstacles.splice(i,1);showPopup('🛡 محمي!','#00e5ff',o.position.clone());}
      else{takeDamage(o.position.clone());scene.remove(o);obstacles.splice(i,1);}
    }
  }
  // coins
  for(let i=coinMeshes.length-1;i>=0;i--){
    const c=coinMeshes[i];c.position.z+=speed;
    if(c.position.z>15){scene.remove(c);coinMeshes.splice(i,1);continue;}
    if(Math.abs(c.position.x-player.position.x)<1.15&&Math.abs(c.position.z-player.position.z)<1.15){collectCoin(c.position.clone());scene.remove(c);coinMeshes.splice(i,1);}
  }
  // power-ups
  for(let i=powerUps.length-1;i>=0;i--){
    const pu=powerUps[i];pu.position.z+=speed;
    if(pu.position.z>15){scene.remove(pu);powerUps.splice(i,1);continue;}
    if(Math.abs(pu.position.x-player.position.x)<1.3&&Math.abs(pu.position.z-player.position.z)<1.3){collectPowerUp(pu.userData.puType,pu.position.clone());scene.remove(pu);powerUps.splice(i,1);}
  }
  // trail
  if(Math.random()>0.3){
    const wp=player.position.clone();wp.project(camera);
    const sx=(wp.x*0.5+0.5)*pCv.width,sy=(-wp.y*0.5+0.5)*pCv.height;
    const skin=SKINS.find(s=>s.id===userData.active);
    p2d.push({x:sx,y:sy+8,vx:(Math.random()-0.5)*1.2,vy:Math.random()*2+0.5,life:1,size:Math.random()*3.5+1,color:'#'+skin.glow.toString(16).padStart(6,'0')});
  }
  if(shieldActive&&Math.random()>0.4){
    const wp=player.position.clone();wp.project(camera);
    const sx=(wp.x*0.5+0.5)*pCv.width,sy=(-wp.y*0.5+0.5)*pCv.height;
    const a=Math.random()*Math.PI*2,r=34+Math.random()*10;
    p2d.push({x:sx+Math.cos(a)*r,y:sy+Math.sin(a)*r,vx:0,vy:-0.5,life:0.7,size:2,color:'#00e5ff'});
  }
  pCtx.clearRect(0,0,pCv.width,pCv.height);
  for(let i=p2d.length-1;i>=0;i--){
    const p=p2d[i];p.x+=p.vx;p.y+=p.vy;p.life-=0.04;
    if(p.life<=0){p2d.splice(i,1);continue;}
    pCtx.globalAlpha=p.life;pCtx.fillStyle=p.color;pCtx.beginPath();pCtx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);pCtx.fill();
  }
  pCtx.globalAlpha=1;
  updateHUD();renderer.render(scene,camera);
}

function takeDamage(pos){
  health=Math.max(0,health-25);invincible=true;invincibleTimer=1.8;
  spawnBurst(pos,'#ff2255',30);doFlash('hitOverlay');
  gsap.fromTo('#c',{x:-5},{x:5,yoyo:true,repeat:7,duration:0.04,onComplete:()=>gsap.set('#c',{x:0})});
  updateBars();if(health<=0)endGame();
}
function collectCoin(pos){
  sessionCoins++;energy=Math.min(maxEnergy,energy+4);
  spawnBurst(pos,'#ffd700',16);showPopup('+🪙','#ffd700',pos);updateBars();
}
function collectPowerUp(typeId,pos){
  const def=PU[typeId];
  spawnBurst(pos,def.color,30);showPopup(def.label+' '+def.desc,def.color,pos);
  if(typeId==='health'){health=Math.min(maxHealth,health+35);doFlash('healOverlay');updateBars();}
  else if(typeId==='energy'){energy=Math.min(maxEnergy,energy+40);doFlash('energyOverlay');updateBars();}
  else if(typeId==='shield'){shieldActive=true;shieldTimer=6;playerGlow.color.setHex(0x00e5ff);playerGlow.intensity=3;updatePowerRow();}
  else if(typeId==='magnet'){magnetActive=true;magnetTimer=8;updatePowerRow();}
}
function deactivateShield(){
  shieldActive=false;const skin=SKINS.find(s=>s.id===userData.active);
  playerGlow.color.setHex(skin.glow);playerGlow.intensity=1.2;updatePowerRow();
}
function updatePowerRow(){
  let h='';
  if(shieldActive){const p=(shieldTimer/6*100).toFixed(0);h+=`<div class="pu-icon" style="color:#00e5ff;border-color:#00e5ff;">🛡<div class="pu-timer" style="width:${p}%;background:#00e5ff;"></div></div>`;}
  if(magnetActive){const p=(magnetTimer/8*100).toFixed(0);h+=`<div class="pu-icon" style="color:#ffd700;border-color:#ffd700;">🧲<div class="pu-timer" style="width:${p}%;background:#ffd700;"></div></div>`;}
  document.getElementById('powerRow').innerHTML=h;
}
function triggerStageUp(){
  applyStageEnv(currentStageIdx);
  document.getElementById('stageText').textContent='STAGE '+STAGES[currentStageIdx].num;
  document.getElementById('stageSub').textContent=STAGES[currentStageIdx].icon+' '+STAGES[currentStageIdx].name;
  const fl=document.getElementById('stageFlash'),lb=document.getElementById('levelBg');
  fl.classList.add('show');lb.classList.add('show');
  gsap.fromTo('#c',{scale:1.03},{scale:1,duration:0.6,ease:'power2.out'});
  gsap.fromTo('#c',{x:-7},{x:7,yoyo:true,repeat:10,duration:0.04,onComplete:()=>gsap.set('#c',{x:0})});
  setTimeout(()=>{fl.classList.remove('show');lb.classList.remove('show');},2200);
  health=Math.min(maxHealth,health+10);updateBars();
  showPopup('+10 ❤','#00ff88',player.position.clone());
}
function endGame(){
  gameActive=false;
  const pts=Math.floor(score);
  if(pts>userData.bestScore){userData.bestScore=pts;localStorage.setItem('mp_best',pts);}
  if(currentStageIdx+1>userData.bestStage){userData.bestStage=currentStageIdx+1;localStorage.setItem('mp_bstage',userData.bestStage);}
  userData.coins+=sessionCoins;saveUser();
  document.getElementById('finalStats').innerHTML=`
    <div class="go-stat"><span>المرحلة</span><span style="color:var(--c2)">${STAGES[currentStageIdx].icon} ${STAGES[currentStageIdx].name}</span></div>
    <div class="go-stat"><span>المسافة</span><span style="color:var(--c1)">${Math.floor(totalDist)}m</span></div>
    <div class="go-stat"><span>النقاط</span><span style="color:var(--c5)">${pts}</span></div>
    <div class="go-stat"><span>أفضل</span><span style="color:var(--c3)">${userData.bestScore}</span></div>
    <div class="go-stat"><span>العملات</span><span style="color:var(--c3)">+${sessionCoins} 🪙</span></div>`;
  showScreen('gameOverSc');updateUI();
}
function updateHUD(){document.getElementById('hScore').innerText=Math.floor(score);document.getElementById('hCoins').innerText=sessionCoins;}
function updateBars(){
  const hp=Math.max(0,(health/maxHealth*100));
  document.getElementById('health-bar').style.width=hp+'%';document.getElementById('hHP').innerText=Math.ceil(health);
  document.getElementById('health-bar').style.background=hp<=25?'#ff2255':hp<=55?'linear-gradient(90deg,#ff9900,#ffcc00)':'';
  document.getElementById('energy-bar').style.width=(energy/maxEnergy*100)+'%';document.getElementById('hEN').innerText=Math.ceil(energy);
}
function spawnBurst(pos3,color,n){
  const wp=pos3.clone();wp.project(camera);
  const sx=(wp.x*0.5+0.5)*pCv.width,sy=(-wp.y*0.5+0.5)*pCv.height;
  for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=Math.random()*7+2;p2d.push({x:sx,y:sy,vx:Math.cos(a)*s,vy:Math.sin(a)*s-3,life:1,size:Math.random()*4+1.5,color});}
}
function doFlash(id){const el=document.getElementById(id);el.classList.remove('show');void el.offsetWidth;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),400);}
function showPopup(txt,color,pos3){
  const wp=pos3.clone();wp.project(camera);

  document.body.appendChild(el);setTimeout(()=>el.remove(),900);
}
function updateUI(){
  document.getElementById('mainBalance').innerText='🪙 '+userData.coins;
  document.getElementById('shopBalance').innerText='🪙 '+userData.coins;
  const g=document.getElementById('skinGrid');g.innerHTML='';
  SKINS.forEach(sk=>{

    const face=`<svg width="44" height="44" viewBox="0 0 8 8" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated">
      <rect width="8" height="8" fill="${hx(sk.head)}"/>
      <rect x="0" y="0" width="8" height="3" fill="${hx(sk.hair)}" opacity="0.85"/>
      <rect x="1" y="3" width="2" height="2" fill="${hx(sk.eye)}"/>
      <rect x="5" y="3" width="2" height="2" fill="${hx(sk.eye)}"/>
      <rect x="2" y="6" width="4" height="1" fill="${hx(sk.eye)}" opacity="0.6"/>
    </svg>`;
    g.innerHTML+=`<div class="skinCard ${active?'active':''}"><div class="skin-lock">${owned?'':'🔒'}</div><div class="skin-preview" style="background:${hx(sk.shirt)};box-shadow:0 0 14px ${hx(sk.glow)};border-radius:4px;overflow:hidden;padding:0;">${face}</div><div class="skin-name">${sk.name}</div><button class="skin-btn ${active?'equipped':owned?'owned':''}" onclick="buySkin('${sk.id}',${sk.price})" ${active?'disabled':''}>${active?'✔ مجهّز':owned?'اختيار':can?'🪙'+sk.price:'🔒'+sk.price}</button></div>`;

function buySkin(id,price){
  if(userData.owned.includes(id))userData.active=id;
  else if(userData.coins>=price){userData.coins-=price;userData.owned.push(id);userData.active=id;}
  else return;saveUser();updateUI();
}
function saveUser(){localStorage.setItem('mp_coins',userData.coins);localStorage.setItem('mp_owned',JSON.stringify(userData.owned));localStorage.setItem('mp_active',userData.active);}
function buildStagesSc(){
  const wrap=document.getElementById('stagesWrap');wrap.innerHTML='';
  const colors=['#00e5ff','#ff6b00','#ff2255','#aa00ff','#22ff55','#ffd700'];
  STAGES.forEach((st,i)=>{

    wrap.innerHTML+=`<div class="stage-card ${un?'unlocked':'locked'}"><div class="stage-num" style="color:${colors[i]};text-shadow:0 0 15px ${colors[i]}">${st.num}</div><div class="stage-info"><div class="stage-label" style="color:${colors[i]}">${st.icon} ${st.name}</div><div class="stage-desc">${st.desc}</div><div class="stage-speed">سرعة: ${Math.floor(st.speedMult*100)}%${un?' ✅':' — العب أكثر 🔒'}</div></div></div>`;
  });
}
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.add('hide'));
  ['hud','controls','stageBar'].forEach(x=>{const el=document.getElementById(x);if(el)el.style.display='none';});
  if(id==='hud'){
    document.getElementById('hud').style.display='flex';
    document.getElementById('controls').style.display='block';
    document.getElementById('stageBar').style.display='block';
  } else {
    document.getElementById(id).classList.remove('hide');
  }
}

function doJump(){
  if(!isJumping&&gameActive){
    isJumping=true;jumpVY=JUMP_FORCE;
    spawnBurst(player.position.clone(),'#00ff88',8);
  }
}

// ── Joystick ────────────────────────────────────────────────────────────────
(function(){
  const wrap=document.getElementById('joyWrap');
  const knob=document.getElementById('joyKnob');
  const R=36, DEAD=12;
  let tid=-1, active=false, laneTimer=null;

  function centre(){
    const r=wrap.getBoundingClientRect();
    return {cx:r.left+r.width/2, cy:r.top+r.height/2};
  }

  function move(tx,ty){
    const {cx,cy}=centre();
    let dx=tx-cx, dy=ty-cy;
    const dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>R){dx*=R/dist; dy*=R/dist;}
    knob.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;

    // lane switch with cooldown
    if(!laneTimer){
      if(dx < -DEAD && targetLane > -1){
        targetLane--;
        laneTimer=setTimeout(()=>{ laneTimer=null; }, 270);
      } else if(dx > DEAD && targetLane < 1){
        targetLane++;
        laneTimer=setTimeout(()=>{ laneTimer=null; }, 270);
      }
    }
  }

  function reset(){
    active=false; tid=-1;
    knob.classList.remove('active');
    knob.style.transform='translate(-50%,-50%)';
    if(laneTimer){clearTimeout(laneTimer);laneTimer=null;}
  }

  wrap.addEventListener('touchstart',e=>{
    e.preventDefault();
    active=true; tid=e.touches[0].identifier;
    knob.classList.add('active');
    move(e.touches[0].clientX, e.touches[0].clientY);
  },{passive:false});

  wrap.addEventListener('touchmove',e=>{
    e.preventDefault();
    for(const t of e.touches){
      if(t.identifier===tid){move(t.clientX,t.clientY);break;}
    }
  },{passive:false});

  wrap.addEventListener('touchend',  e=>{e.preventDefault();reset();},{passive:false});
  wrap.addEventListener('touchcancel',e=>{e.preventDefault();reset();},{passive:false});
})();

// ── Jump button ──────────────────────────────────────────────────────────────
document.getElementById('btnJump').addEventListener('touchstart',e=>{e.preventDefault();doJump();},{passive:false});
document.getElementById('btnJump').addEventListener('mousedown',()=>doJump());

// ── Keyboard ────────────────────────────────────────────────────────────────
window.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'  && targetLane>-1) targetLane--;
  if(e.key==='ArrowRight' && targetLane< 1) targetLane++;
  if((e.key==='ArrowUp'||e.key===' ')&&!e.repeat) doJump();
  if(e.key==='v'||e.key==='V') viewMode=viewMode===0?1:0;
});
window.addEventListener('resize',()=>{
  if(!renderer)return;
  camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);resizeP();
});
// Clear stale skin data if skin no longer exists
(function(){
  const owned = JSON.parse(localStorage.getItem('mp_owned')||'[]');
  const active = localStorage.getItem('mp_active')||'';
  const ids = ['steve','alex','creeper','zombie','skeleton','enderman'];
  if(!ids.includes(active)){localStorage.setItem('mp_active','steve');}
  const validOwned = owned.filter(id=>ids.includes(id));
  if(!validOwned.length) validOwned.push('steve');
  localStorage.setItem('mp_owned', JSON.stringify(validOwned));
  userData.active = localStorage.getItem('mp_active');
  userData.owned  = JSON.parse(localStorage.getItem('mp_owned'));
})();
// init engine once on load
initThree();
updateUI();
</script>
